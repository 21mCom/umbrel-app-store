manifestVersion: 1
id: 21mcom-app-store-the-watchtower
category: bitcoin
name: The Watchtower
icon: https://raw.githubusercontent.com/21mCom/umbrel-app-store/main/21mcom-app-store-the-watchtower/icon.png
version: "1.0.6"
tagline: Monitor Bitcoin addresses via your own node
description: >-
  The Watchtower connects directly to your Bitcoin node's Electrum server
  (Electrs or Fulcrum) and watches any addresses you choose. When coins move —
  whether hitting the mempool or getting confirmed — you get an XMPP message
  instantly. No third-party APIs, no external data. Your node, your rules, your
  alerts.
releaseNotes: >-
  Adds a Save button to the Node Connection section of Settings, so node
  connection changes can be saved directly from that panel.
developer: 21mCom
website: https://github.com/21mCom/TheWatchTower
dependencies:
  - electrs
